<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacos el Colorado - Servicio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 min-h-screen text-gray-100 pb-40">

    <div class="flex items-center gap-3 px-4 py-4 border-b border-gray-800 sticky top-0 bg-gray-900 z-10">
        <button onclick="window.location.href='inicio.html'" class="text-gray-400 hover:text-white text-2xl">←</button>
        <div class="flex-1">
            <h1 id="titulo-mesa" class="text-xl font-extrabold"></h1>
            <p id="estado-pedido" class="text-xs text-gray-500"></p><p id="badge-atendido" class="hidden text-xs text-gray-400 mt-1 flex items-center gap-1"></p>
        </div>
    </div>

    <div id="cargando" class="text-center text-gray-400 py-10">Cargando pedido...</div>

    <div id="contenido" class="hidden px-4 py-4 space-y-6">

        <div id="botones-agregar" class="grid grid-cols-2 gap-3">
            <button id="btn-abrir-taco" class="bg-yellow-700 hover:bg-yellow-600 rounded-2xl py-4 font-bold flex flex-col items-center gap-1">
                <span class="text-2xl">🌮</span> Nuevo plato
            </button>
            <button id="btn-abrir-bebida" class="bg-blue-700 hover:bg-blue-600 rounded-2xl py-4 font-bold flex flex-col items-center gap-1">
                <span class="text-2xl">🥤</span> Agregar bebida
            </button>
        </div>

        <div id="seccion-notas" class="bg-gray-800 border border-gray-700 rounded-2xl p-4 space-y-2">
            <p class="text-sm font-bold text-gray-300">📝 Notas para cocina</p>
            <textarea id="input-notas" rows="2" placeholder="Ej: sin cebolla, cliente alérgico a cacahuate, urge..."
                class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2 text-sm text-gray-200"></textarea>
            <button id="btn-guardar-notas" class="bg-gray-700 hover:bg-gray-600 rounded-xl px-4 py-2 text-sm font-semibold">
                Guardar nota
            </button>
        </div>

        <div id="panel-taco" class="hidden bg-gray-800 border border-gray-700 rounded-2xl p-4 space-y-4">
            <h3 class="font-bold text-lg">Armar plato</h3>

            <div>
                <p class="text-sm text-gray-400 mb-1">Tortilla</p>
                <div class="grid grid-cols-2 gap-2">
                    <button data-tortilla="grande" class="btn-tortilla bg-gray-700 rounded-xl py-2">Grande ($22)</button>
                    <button data-tortilla="normal" class="btn-tortilla bg-gray-700 rounded-xl py-2">Normal ($15)</button>
                </div>
            </div>

            <div>
                <p class="text-sm text-gray-400 mb-1">Textura de tortilla</p>
                <div class="grid grid-cols-3 gap-2">
                    <button data-textura="blandita" class="btn-textura bg-gray-700 rounded-xl py-2 text-sm">Blandita</button>
                    <button data-textura="dorada" class="btn-textura bg-gray-700 rounded-xl py-2 text-sm">Dorada</button>
                    <button data-textura="tostada" class="btn-textura bg-gray-700 rounded-xl py-2 text-sm">Tostada</button>
                </div>
            </div>

            <div>
                <p class="text-sm text-gray-400 mb-1">Tipo (elige 1, o varios para combinado)</p>
                <div class="grid grid-cols-2 gap-2">
                    <button data-tipo="bistec" class="btn-tipo bg-gray-700 rounded-xl py-2">Bistec</button>
                    <button data-tipo="obispo" class="btn-tipo bg-gray-700 rounded-xl py-2">Obispo</button>
                    <button data-tipo="longaniza" class="btn-tipo bg-gray-700 rounded-xl py-2">Longaniza</button>
                    <button data-tipo="suadero" class="btn-tipo bg-gray-700 rounded-xl py-2">Suadero</button>
                </div>
            </div>

            <div id="opciones-longaniza" class="hidden">
                <p class="text-sm text-gray-400 mb-1">Estilo de longaniza</p>
                <div class="grid grid-cols-2 gap-2">
                    <button data-longaniza="normal" class="btn-longaniza bg-gray-700 rounded-xl py-2 text-sm">Normal</button>
                    <button data-longaniza="dorada" class="btn-longaniza bg-gray-700 rounded-xl py-2 text-sm">Dorada</button>
                </div>
            </div>

            <div>
                <p class="text-sm text-gray-400 mb-1">Terminado</p>
                <div class="grid grid-cols-2 gap-2">
                    <button data-term="cebolla" class="btn-term bg-gray-700 rounded-xl py-2">🧅 Cebolla</button>
                    <button data-term="cilantro" class="btn-term bg-gray-700 rounded-xl py-2">🌿 Cilantro</button>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <p class="text-sm text-gray-400">Cantidad</p>
                <button id="taco-menos" class="w-9 h-9 bg-gray-700 rounded-lg">-</button>
                <span id="taco-cantidad" class="w-8 text-center font-bold">1</span>
                <button id="taco-mas" class="w-9 h-9 bg-gray-700 rounded-lg">+</button>
            </div>

            <button id="btn-agregar-linea-taco" class="w-full bg-yellow-600 hover:bg-yellow-500 rounded-xl py-3 font-bold">
                + Agregar al plato
            </button>

            <div id="lista-staging-tacos" class="space-y-2"></div>

            <div class="flex gap-2">
                <button id="btn-guardar-plato" class="flex-1 bg-green-700 hover:bg-green-600 rounded-xl py-3 font-bold" disabled>
                    Guardar plato
                </button>
                <button id="btn-cancelar-plato" class="bg-gray-700 hover:bg-gray-600 rounded-xl px-4 py-3">
                    Cancelar
                </button>
            </div>
        </div>
        <div id="panel-bebida" class="hidden bg-gray-800 border border-gray-700 rounded-2xl p-4 space-y-4">
            <h3 class="font-bold text-lg">Agregar bebida</h3>

            <div>
                <p class="text-sm text-gray-400 mb-1">Tipo</p>
                <div class="grid grid-cols-2 gap-2">
                    <button data-bebida="agua_simple" class="btn-bebida-tipo bg-gray-700 rounded-xl py-2">Agua simple</button>
                    <button data-bebida="cafe" class="btn-bebida-tipo bg-gray-700 rounded-xl py-2">Café</button>
                    <button data-bebida="agua_sabor" class="btn-bebida-tipo bg-gray-700 rounded-xl py-2">Agua de sabor</button>
                    <button data-bebida="refresco" class="btn-bebida-tipo bg-gray-700 rounded-xl py-2">Refresco</button>
                </div>
            </div>

            <div id="opciones-tamano" class="hidden">
                <p class="text-sm text-gray-400 mb-1">Tamaño</p>
                <div id="botones-tamano" class="grid grid-cols-2 gap-2"></div>
            </div>

            <div id="opciones-sabor" class="hidden">
                <p class="text-sm text-gray-400 mb-1">Sabor</p>
                <div id="botones-sabor" class="grid grid-cols-2 gap-2"></div>
            </div>

            <div class="flex items-center gap-3">
                <p class="text-sm text-gray-400">Cantidad</p>
                <button id="bebida-menos" class="w-9 h-9 bg-gray-700 rounded-lg">-</button>
                <span id="bebida-cantidad" class="w-8 text-center font-bold">1</span>
                <button id="bebida-mas" class="w-9 h-9 bg-gray-700 rounded-lg">+</button>
            </div>

            <div class="flex gap-2">
                <button id="btn-guardar-bebida" class="flex-1 bg-green-700 hover:bg-green-600 rounded-xl py-3 font-bold" disabled>
                    Agregar
                </button>
                <button id="btn-cancelar-bebida" class="bg-gray-700 hover:bg-gray-600 rounded-xl px-4 py-3">
                    Cancelar
                </button>
            </div>
        </div>

        <div>
            <h3 class="font-bold text-lg mb-2">Pedido actual</h3>
            <div id="lista-pedido" class="space-y-3"></div>
            <p id="pedido-vacio" class="text-gray-500 text-center py-6">Todavía no has agregado nada.</p>
        </div>
    </div>

    <div id="barra-inferior" class="hidden fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 px-4 py-3 flex items-center justify-between gap-2">
        <div>
            <p class="text-xs text-gray-400">Total</p>
            <p id="total-pedido" class="text-xl font-extrabold">$0</p>
        </div>
        <div class="flex gap-2">
            <button id="btn-enviar-cocina" class="hidden bg-red-700 hover:bg-red-600 rounded-xl px-4 py-3 font-bold text-sm">
                Enviar a cocina →
            </button>
            <button id="btn-pedir-cuenta" class="hidden bg-purple-700 hover:bg-purple-600 rounded-xl px-4 py-3 font-bold text-sm">
                Pedir cuenta 🧾
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://sscfugtmwhdtjwlrwfzr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_D8pajZjVyJWO-u7u3OsnKw_RGqKPOBO";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const params = new URLSearchParams(window.location.search);
        const numeroMesa = parseInt(params.get('mesa')) || null;
        document.getElementById('titulo-mesa').textContent = numeroMesa ? `Mesa ${numeroMesa}` : 'Para llevar';

        let precios = {};
        let pedidoActual = null;
        let usuarioId = null;
        let usuarioRol = null;

        let stagingTacos = [];
        let tacoSel = { tortilla: null, textura: 'blandita', tipos: [], longanizaEstilo: 'normal', cebolla: false, cilantro: false, cantidad: 1 };
        let bebidaSel = { tipo: null, tamano: null, sabor: null, cantidad: 1 };

        const opcionesBebida = {
            agua_simple: { tamanos: null, sabores: null },
            cafe: { tamanos: null, sabores: null },
            agua_sabor: {
                tamanos: [{ id: 'medio', label: 'Medio litro ($20)' }, { id: 'litro', label: 'Litro ($35)' }],
                sabores: [{ id: 'horchata', label: 'Horchata' }, { id: 'jamaica', label: 'Jamaica' }]
            },
            refresco: {
                tamanos: [{ id: '350', label: '350ml ($25)' }, { id: '600', label: '600ml ($35)' }],
                sabores: null
            }
        };

        const saboresRefresco = {
            '350': ['Coca', 'Coca Light', 'Fanta', 'Sprite', 'Tehuacán', 'Sidral', 'Manzana', 'Mango', 'Guayaba'],
            '600': ['Coca', 'Delaware']
        };

        function precioTaco(tortilla) {
            return tortilla === 'grande' ? precios['taco_grande'] : precios['taco_normal'];
        }

        function precioBebida(tipo, tamano) {
            if (tipo === 'agua_simple') return precios['agua_simple'];
            if (tipo === 'cafe') return precios['cafe'];
            if (tipo === 'agua_sabor') return tamano === 'litro' ? precios['agua_sabor_litro'] : precios['agua_sabor_medio'];
            if (tipo === 'refresco') return tamano === '600' ? precios['refresco_600'] : precios['refresco_350'];
            return 0;
        }

        function puedeEditarEnviados() {
            return usuarioRol === 'cajero' || usuarioRol === 'administrador';
        }
        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            usuarioId = user.id;

            const { data: perfil } = await supabaseClient
                .from('perfiles').select('rol').eq('id', user.id).single();
            usuarioRol = perfil ? perfil.rol : 'invitado';

            const { data: preciosData } = await supabaseClient.from('precios').select('*');
            preciosData.forEach(p => precios[p.concepto] = Number(p.valor));

            await cargarOAbrirPedido();
            await cargarPedidoCompleto();

            document.getElementById('cargando').classList.add('hidden');
            document.getElementById('contenido').classList.remove('hidden');
        }

        async function cargarOAbrirPedido() {
            let query = supabaseClient.from('pedidos').select('*').in('estado', ['abierto', 'cuenta_pedida']);
            query = numeroMesa ? query.eq('mesa_numero', numeroMesa) : query.is('mesa_numero', null);
            const { data } = await query.limit(1).maybeSingle();

            if (data) {
                pedidoActual = data;
            } else {
                const { data: nuevo, error } = await supabaseClient.from('pedidos')
                    .insert({ mesa_numero: numeroMesa, mesero_id: usuarioId, estado: 'abierto' })
                    .select().single();
                if (error) { alert('Error al abrir el pedido: ' + error.message); return; }
                pedidoActual = nuevo;
            }
        }

        async function mostrarAtendidoPor() {
            if (!pedidoActual.mesero_id) return;
            const { data: perfilMesero } = await supabaseClient
                .from('perfiles').select('nombre_completo, color').eq('id', pedidoActual.mesero_id).single();
            if (!perfilMesero) return;

            const nombre = perfilMesero.nombre_completo || 'Sin nombre';
            const color = perfilMesero.color || '#6b7280';
            const badge = document.getElementById('badge-atendido');
            badge.innerHTML = `<span class="inline-block w-2 h-2 rounded-full" style="background-color:${color}"></span> Atendido por: <span class="font-semibold">${nombre}</span>`;
            badge.classList.remove('hidden');
        }

        async function cargarPedidoCompleto() {
            const cuentaPedida = pedidoActual.estado === 'cuenta_pedida';

            document.getElementById('estado-pedido').textContent = cuentaPedida
                ? 'Cuenta pedida — esperando cobro en caja'
                : 'Pedido abierto';
            document.getElementById('botones-agregar').classList.toggle('hidden', cuentaPedida);
            document.getElementById('seccion-notas').classList.toggle('hidden', cuentaPedida);

            document.getElementById('input-notas').value = pedidoActual.notas || '';

            await mostrarAtendidoPor();

            const { data: platos } = await supabaseClient.from('platos')
                .select('*, tacos(*)').eq('pedido_id', pedidoActual.id).order('creado_en');
            const { data: bebidas } = await supabaseClient.from('bebidas')
                .select('*').eq('pedido_id', pedidoActual.id).order('creado_en');

            renderPedido(platos || [], bebidas || [], cuentaPedida);
        }
        function renderPedido(platos, bebidas, cuentaPedida) {
            const lista = document.getElementById('lista-pedido');
            lista.innerHTML = '';
            let total = 0;
            let hayItems = false;
            let hayPendientesPorEnviar = false;

            platos.forEach((plato, idx) => {
                if (!plato.tacos || plato.tacos.length === 0) return;
                hayItems = true;
                let totalPlato = 0;
                const lineasHtml = plato.tacos.map(t => {
                    const subtotal = t.precio_unitario * t.cantidad;
                    totalPlato += subtotal;
                    if (!t.enviado) hayPendientesPorEnviar = true;
                    const puedeBorrar = !cuentaPedida && (!t.enviado || puedeEditarEnviados());
                    const term = [t.cebolla ? 'cebolla' : null, t.cilantro ? 'cilantro' : null].filter(Boolean).join(' y ') || 'sin nada';
                    const longanizaTxt = t.tipos.includes('longaniza') && t.longaniza_estilo ? ` (long. ${t.longaniza_estilo})` : '';
                    return `<div class="flex justify-between items-center text-sm py-1">
                        <span>${t.cantidad}x ${t.tipos.join(' + ')} (${t.tortilla}, ${t.textura_tortilla}, ${term})${longanizaTxt}${t.enviado ? ' <span class="text-green-500">✓ cocina</span>' : ''}</span>
                        <div class="flex items-center gap-2">
                            <span class="text-gray-400">$${subtotal}</span>
                            ${puedeBorrar ? `<button data-taco-id="${t.id}" class="btn-borrar-taco text-red-400">🗑️</button>` : ''}
                        </div>
                    </div>`;
                }).join('');
                total += totalPlato;
                lista.innerHTML += `<div class="bg-gray-800 border border-gray-700 rounded-xl p-3">
                    <div class="flex justify-between font-semibold mb-1">
                        <span>Plato ${idx + 1}</span><span>$${totalPlato}</span>
                    </div>
                    ${lineasHtml}
                </div>`;
            });

            bebidas.forEach(b => {
                hayItems = true;
                if (!b.enviado) hayPendientesPorEnviar = true;
                const puedeBorrar = !cuentaPedida && (!b.enviado || puedeEditarEnviados());
                const subtotal = b.precio_unitario * b.cantidad;
                total += subtotal;
                const detalle = [b.sabor, b.tamano].filter(Boolean).join(', ');
                lista.innerHTML += `<div class="bg-gray-800 border border-gray-700 rounded-xl p-3 flex justify-between items-center">
                    <span class="text-sm">${b.cantidad}x ${b.tipo.replace('_',' ')} ${detalle ? `(${detalle})` : ''}${b.enviado ? ' <span class="text-green-500">✓ cocina</span>' : ''}</span>
                    <div class="flex items-center gap-2">
                        <span class="text-gray-400">$${subtotal}</span>
                        ${puedeBorrar ? `<button data-bebida-id="${b.id}" class="btn-borrar-bebida text-red-400">🗑️</button>` : ''}
                    </div>
                </div>`;
            });

            document.getElementById('pedido-vacio').classList.toggle('hidden', hayItems);
            document.getElementById('total-pedido').textContent = `$${total}`;
            document.getElementById('barra-inferior').classList.toggle('hidden', !hayItems);
            document.getElementById('btn-enviar-cocina').classList.toggle('hidden', !hayPendientesPorEnviar || cuentaPedida);
            document.getElementById('btn-pedir-cuenta').classList.toggle('hidden', !hayItems || cuentaPedida);

            document.querySelectorAll('.btn-borrar-taco').forEach(b => b.addEventListener('click', async () => {
                await supabaseClient.from('tacos').delete().eq('id', b.dataset.tacoId);
                cargarPedidoCompleto();
            }));
            document.querySelectorAll('.btn-borrar-bebida').forEach(b => b.addEventListener('click', async () => {
                await supabaseClient.from('bebidas').delete().eq('id', b.dataset.bebidaId);
                cargarPedidoCompleto();
            }));
        }

        const panelTaco = document.getElementById('panel-taco');
        document.getElementById('btn-abrir-taco').addEventListener('click', () => {
            resetTacoSel();
            stagingTacos = [];
            renderStagingTacos();
            panelTaco.classList.remove('hidden');
            document.getElementById('panel-bebida').classList.add('hidden');
        });
        document.getElementById('btn-cancelar-plato').addEventListener('click', () => panelTaco.classList.add('hidden'));

        function resetTacoSel() {
            tacoSel = { tortilla: null, textura: 'blandita', tipos: [], longanizaEstilo: 'normal', cebolla: false, cilantro: false, cantidad: 1 };
            document.querySelectorAll('.btn-tortilla, .btn-tipo, .btn-term, .btn-textura, .btn-longaniza').forEach(b => b.classList.remove('bg-yellow-600'));
            document.querySelector('.btn-textura[data-textura="blandita"]').classList.add('bg-yellow-600');
            document.querySelector('.btn-longaniza[data-longaniza="normal"]').classList.add('bg-yellow-600');
            document.getElementById('opciones-longaniza').classList.add('hidden');
            document.getElementById('taco-cantidad').textContent = '1';
        }

        document.querySelectorAll('.btn-tortilla').forEach(btn => btn.addEventListener('click', () => {
            tacoSel.tortilla = btn.dataset.tortilla;
            document.querySelectorAll('.btn-tortilla').forEach(b => b.classList.remove('bg-yellow-600'));
            btn.classList.add('bg-yellow-600');
        }));

        document.querySelectorAll('.btn-textura').forEach(btn => btn.addEventListener('click', () => {
            tacoSel.textura = btn.dataset.textura;
            document.querySelectorAll('.btn-textura').forEach(b => b.classList.remove('bg-yellow-600'));
            btn.classList.add('bg-yellow-600');
        }));

        document.querySelectorAll('.btn-longaniza').forEach(btn => btn.addEventListener('click', () => {
            tacoSel.longanizaEstilo = btn.dataset.longaniza;
            document.querySelectorAll('.btn-longaniza').forEach(b => b.classList.remove('bg-yellow-600'));
            btn.classList.add('bg-yellow-600');
        }));

        document.querySelectorAll('.btn-tipo').forEach(btn => btn.addEventListener('click', () => {
            const tipo = btn.dataset.tipo;
            if (tacoSel.tipos.includes(tipo)) {
                tacoSel.tipos = tacoSel.tipos.filter(t => t !== tipo);
                btn.classList.remove('bg-yellow-600');
            } else {
                tacoSel.tipos.push(tipo);
                btn.classList.add('bg-yellow-600');
            }
            document.getElementById('opciones-longaniza').classList.toggle('hidden', !tacoSel.tipos.includes('longaniza'));
        }));

        document.querySelectorAll('.btn-term').forEach(btn => btn.addEventListener('click', () => {
            const term = btn.dataset.term;
            tacoSel[term] = !tacoSel[term];
            btn.classList.toggle('bg-yellow-600', tacoSel[term]);
        }));

        document.getElementById('taco-menos').addEventListener('click', () => {
            if (tacoSel.cantidad > 1) tacoSel.cantidad--;
            document.getElementById('taco-cantidad').textContent = tacoSel.cantidad;
        });
        document.getElementById('taco-mas').addEventListener('click', () => {
            tacoSel.cantidad++;
            document.getElementById('taco-cantidad').textContent = tacoSel.cantidad;
        });

        document.getElementById('btn-agregar-linea-taco').addEventListener('click', () => {
            if (!tacoSel.tortilla || tacoSel.tipos.length === 0) {
                alert('Elige tortilla y al menos un tipo de carne.');
                return;
            }
            stagingTacos.push({ ...tacoSel });
            resetTacoSel();
            renderStagingTacos();
        });

        function renderStagingTacos() {
            const cont = document.getElementById('lista-staging-tacos');
            cont.innerHTML = stagingTacos.map((t, i) => {
                const term = [t.cebolla ? 'cebolla' : null, t.cilantro ? 'cilantro' : null].filter(Boolean).join(' y ') || 'sin nada';
                const longanizaTxt = t.tipos.includes('longaniza') ? ` (long. ${t.longanizaEstilo})` : '';
                return `<div class="flex justify-between items-center bg-gray-700 rounded-lg px-3 py-2 text-sm">
                    <span>${t.cantidad}x ${t.tipos.join(' + ')} (${t.tortilla}, ${t.textura}, ${term})${longanizaTxt}</span>
                    <button data-idx="${i}" class="btn-quitar-staging text-red-400">✕</button>
                </div>`;
            }).join('');
            document.querySelectorAll('.btn-quitar-staging').forEach(b => b.addEventListener('click', () => {
                stagingTacos.splice(Number(b.dataset.idx), 1);
                renderStagingTacos();
            }));
            document.getElementById('btn-guardar-plato').disabled = stagingTacos.length === 0;
        }document.getElementById('btn-guardar-plato').addEventListener('click', async () => {
            const { data: plato, error } = await supabaseClient.from('platos')
                .insert({ pedido_id: pedidoActual.id }).select().single();
            if (error) { alert('Error: ' + error.message); return; }

            const filas = stagingTacos.map(t => ({
                plato_id: plato.id,
                tortilla: t.tortilla,
                textura_tortilla: t.textura,
                tipos: t.tipos,
                longaniza_estilo: t.tipos.includes('longaniza') ? t.longanizaEstilo : null,
                cebolla: t.cebolla,
                cilantro: t.cilantro,
                cantidad: t.cantidad,
                precio_unitario: precioTaco(t.tortilla),
                enviado: false
            }));
            await supabaseClient.from('tacos').insert(filas);

            panelTaco.classList.add('hidden');
            cargarPedidoCompleto();
        });

        const panelBebida = document.getElementById('panel-bebida');
        document.getElementById('btn-abrir-bebida').addEventListener('click', () => {
            resetBebidaSel();
            panelBebida.classList.remove('hidden');
            panelTaco.classList.add('hidden');
        });
        document.getElementById('btn-cancelar-bebida').addEventListener('click', () => panelBebida.classList.add('hidden'));

        function resetBebidaSel() {
            bebidaSel = { tipo: null, tamano: null, sabor: null, cantidad: 1 };
            document.querySelectorAll('.btn-bebida-tipo').forEach(b => b.classList.remove('bg-green-600'));
            document.getElementById('opciones-tamano').classList.add('hidden');
            document.getElementById('opciones-sabor').classList.add('hidden');
            document.getElementById('bebida-cantidad').textContent = '1';
            document.getElementById('btn-guardar-bebida').disabled = true;
        }

        document.querySelectorAll('.btn-bebida-tipo').forEach(btn => btn.addEventListener('click', () => {
            const tipo = btn.dataset.bebida;
            bebidaSel = { tipo, tamano: null, sabor: null, cantidad: bebidaSel.cantidad };
            document.querySelectorAll('.btn-bebida-tipo').forEach(b => b.classList.remove('bg-green-600'));
            btn.classList.add('bg-green-600');

            const config = opcionesBebida[tipo];
            const contTamano = document.getElementById('botones-tamano');
            const contSabor = document.getElementById('botones-sabor');
            contTamano.innerHTML = '';
            contSabor.innerHTML = '';

            if (config.tamanos) {
                document.getElementById('opciones-tamano').classList.remove('hidden');
                config.tamanos.forEach(t => {
                    const b = document.createElement('button');
                    b.textContent = t.label;
                    b.className = 'btn-tamano bg-gray-700 rounded-xl py-2';
                    b.dataset.tamano = t.id;
                    b.addEventListener('click', () => {
                        bebidaSel.tamano = t.id;
                        bebidaSel.sabor = null;
                        document.querySelectorAll('.btn-tamano').forEach(x => x.classList.remove('bg-green-600'));
                        b.classList.add('bg-green-600');

                        if (tipo === 'refresco') {
                            contSabor.innerHTML = '';
                            document.getElementById('opciones-sabor').classList.remove('hidden');
                            saboresRefresco[t.id].forEach(s => {
                                const sb = document.createElement('button');
                                sb.textContent = s;
                                sb.className = 'btn-sabor bg-gray-700 rounded-xl py-2';
                                sb.addEventListener('click', () => {
                                    bebidaSel.sabor = s;
                                    document.querySelectorAll('.btn-sabor').forEach(x => x.classList.remove('bg-green-600'));
                                    sb.classList.add('bg-green-600');
                                    validarBebida();
                                });
                                contSabor.appendChild(sb);
                            });
                        }
                        validarBebida();
                    });
                    contTamano.appendChild(b);
                });
            } else {
                document.getElementById('opciones-tamano').classList.add('hidden');
            }

            if (config.sabores) {
                document.getElementById('opciones-sabor').classList.remove('hidden');
                config.sabores.forEach(s => {
                    const sb = document.createElement('button');
                    sb.textContent = s.label;
                    sb.className = 'btn-sabor bg-gray-700 rounded-xl py-2';
                    sb.addEventListener('click', () => {
                        bebidaSel.sabor = s.id;
                        document.querySelectorAll('.btn-sabor').forEach(x => x.classList.remove('bg-green-600'));
                        sb.classList.add('bg-green-600');
                        validarBebida();
                    });
                    contSabor.appendChild(sb);
                });
            } else if (tipo !== 'refresco') {
                document.getElementById('opciones-sabor').classList.add('hidden');
            }

            validarBebida();
        }));

        function validarBebida() {
            const necesitaTamano = opcionesBebida[bebidaSel.tipo]?.tamanos;
            const necesitaSabor = opcionesBebida[bebidaSel.tipo]?.sabores || bebidaSel.tipo === 'refresco';
            const ok = bebidaSel.tipo &&
                (!necesitaTamano || bebidaSel.tamano) &&
                (!necesitaSabor || bebidaSel.sabor);
            document.getElementById('btn-guardar-bebida').disabled = !ok;
        }

        document.getElementById('bebida-menos').addEventListener('click', () => {
            if (bebidaSel.cantidad > 1) bebidaSel.cantidad--;
            document.getElementById('bebida-cantidad').textContent = bebidaSel.cantidad;
        });
        document.getElementById('bebida-mas').addEventListener('click', () => {
            bebidaSel.cantidad++;
            document.getElementById('bebida-cantidad').textContent = bebidaSel.cantidad;
        });

        document.getElementById('btn-guardar-bebida').addEventListener('click', async () => {
            const fila = {
                pedido_id: pedidoActual.id,
                tipo: bebidaSel.tipo,
                tamano: bebidaSel.tamano,
                sabor: bebidaSel.sabor,
                cantidad: bebidaSel.cantidad,
                precio_unitario: precioBebida(bebidaSel.tipo, bebidaSel.tamano),
                enviado: false
            };
            const { error } = await supabaseClient.from('bebidas').insert(fila);
            if (error) { alert('Error: ' + error.message); return; }

            panelBebida.classList.add('hidden');
            cargarPedidoCompleto();
        });

        document.getElementById('btn-guardar-notas').addEventListener('click', async () => {
            const texto = document.getElementById('input-notas').value;
            const { error } = await supabaseClient.from('pedidos')
                .update({ notas: texto }).eq('id', pedidoActual.id);
            if (error) { alert('Error: ' + error.message); return; }
            pedidoActual.notas = texto;
            alert('Nota guardada.');
        });

        document.getElementById('btn-enviar-cocina').addEventListener('click', async () => {
            const { data: platosPedido } = await supabaseClient.from('platos')
                .select('id').eq('pedido_id', pedidoActual.id);
            const idsPlatos = (platosPedido || []).map(p => p.id);

            if (idsPlatos.length > 0) {
                await supabaseClient.from('tacos').update({ enviado: true })
                    .in('plato_id', idsPlatos).eq('enviado', false);
            }
            await supabaseClient.from('bebidas').update({ enviado: true })
                .eq('pedido_id', pedidoActual.id).eq('enviado', false);

            alert('¡Pedido enviado a cocina!');
            cargarPedidoCompleto();
        });

        document.getElementById('btn-pedir-cuenta').addEventListener('click', async () => {
            const confirmar = confirm('¿Pedir la cuenta? Ya no se podrá modificar el pedido.');
            if (!confirmar) return;

            const { error } = await supabaseClient.from('pedidos')
                .update({ estado: 'cuenta_pedida' })
                .eq('id', pedidoActual.id);
            if (error) { alert('Error: ' + error.message); return; }

            pedidoActual.estado = 'cuenta_pedida';
            alert('Cuenta pedida. Espera a que caja confirme el cobro.');
            cargarPedidoCompleto();
        });

        init();
    </script>
</body>
</html>
